name: Odysseus
options:
  bundleIdPrefix: com.zao
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: "2.4.1"
  SwiftWhisper:
    url: https://github.com/exPHAT/SwiftWhisper
    branch: master
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.12.4"

configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

settings:
  base:
    # DEVELOPMENT_TEAM comes from Signing.xcconfig → Local.xcconfig (gitignored), so the
    # real team id is never committed. See Local.xcconfig.example.
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

schemes:
  Odysseus:
    build:
      targets:
        Odysseus: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - OdysseusTests
    archive:
      config: Release

targets:
  OdysseusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OdysseusTests
    dependencies:
      - target: Odysseus
    settings:
      base:
        # xcodegen writes no Info.plist for the test bundle, and codesign refuses
        # to sign it without one.
        GENERATE_INFOPLIST_FILE: YES

  Odysseus:
    type: application
    platform: iOS
    sources:
      - path: Odysseus
        excludes:
          - "Resources/Info-macOS.plist"
          - "Resources/Odysseus-macOS.entitlements"
    dependencies:
      - package: MarkdownUI
      - package: SwiftWhisper
      - package: ZIPFoundation
      - package: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zao.odysseus
        PRODUCT_NAME: Odysseus
        MARKETING_VERSION: "1.6"
        CURRENT_PROJECT_VERSION: "11"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      path: Odysseus/Resources/Info.plist
      properties:
        CFBundleDisplayName: Odysseus
        # Drive version from the build settings (xcodegen hardcodes CFBundleVersion=1).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # So App Store Connect can pull the marketing icon.
        CFBundleIconName: AppIcon
        # Orientations must live in the Info.plist (INFOPLIST_KEY_* are ignored
        # with a custom plist) — iPad needs all four (fixes upload error 90474).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: "LaunchBackground"
        ITSAppUsesNonExemptEncryption: false
        # These raw values are only the LAST-RESORT fallback: CFBundleDevelopmentRegion
        # resolves to `en`, so they must be ENGLISH. Every language (incl. pt-BR) is
        # translated in Resources/<lang>.lproj/InfoPlist.strings — without those the
        # system consent dialog shows this text verbatim regardless of the app's
        # language, which is what got 1.6 rejected under guideline 4.0 (Design).
        NSLocalNetworkUsageDescription: "Odysseus needs local network access to reach your AI server on your network."
        NSMicrophoneUsageDescription: "Odysseus uses the microphone so you can dictate your messages by voice."
        NSSpeechRecognitionUsageDescription: "Odysseus transcribes your speech into text on your device."
        NSFaceIDUsageDescription: "Odysseus uses Face ID to lock the app and sign you in automatically (optional)."
        NSAppTransportSecurity:
          # Scoped to the LAN: plain HTTP is allowed only to local/private hosts
          # (the self-hosted server / ComfyUI). Public hosts must use HTTPS — and
          # ServerConfig.normalize already forces https for any non-local host, so
          # the blanket NSAllowsArbitraryLoads is intentionally NOT set (S6).
          NSAllowsLocalNetworking: true

  # Native macOS app — same SwiftUI source as iOS, with platform shims in
  # Config/PlatformCompat.swift. Builds for Apple Silicon Macs (macOS 14+).
  Odysseus-macOS:
    type: application
    platform: macOS
    sources:
      - path: Odysseus
        excludes:
          - "Resources/Info.plist"
          - "Resources/Odysseus-macOS.entitlements"
    dependencies:
      - package: MarkdownUI
      - package: SwiftWhisper
      - package: ZIPFoundation
      - package: FluidAudio
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zao.odysseus
        PRODUCT_NAME: Odysseus
        # 1.6.1: /api/models adoption (curated+extra merge, display names,
        # non-LLM endpoint filter) with old-server fallback. 1.7 stays reserved
        # for the AUDIT-1.7.md backlog.
        MARKETING_VERSION: "1.6.1"
        CURRENT_PROJECT_VERSION: "14"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Odysseus/Resources/Odysseus-macOS.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
    info:
      path: Odysseus/Resources/Info-macOS.plist
      properties:
        CFBundleDisplayName: Odysseus
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.productivity
        ITSAppUsesNonExemptEncryption: false
        NSHumanReadableCopyright: "© 2026 JoaoZaokk — PolyForm Noncommercial License 1.0.0"
        # English fallback only — see the iOS target above. The per-language text
        # lives in Resources/<lang>.lproj/InfoPlist.strings.
        NSMicrophoneUsageDescription: "Odysseus uses the microphone so you can dictate your messages by voice."
        NSSpeechRecognitionUsageDescription: "Odysseus transcribes your speech into text on your device."
        NSLocalNetworkUsageDescription: "Odysseus needs local network access to reach your AI server on your network."
        NSAppTransportSecurity:
          # Same as iOS: LAN-scoped only — plain HTTP to local/private hosts; public
          # hosts use HTTPS (enforced by ServerConfig.normalize). No arbitrary loads (S6).
          NSAllowsLocalNetworking: true
