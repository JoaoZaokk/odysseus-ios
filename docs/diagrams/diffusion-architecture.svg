<svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <title>Odysseus — arquitetura de geração de imagem (provedores + fallback + status ao vivo)</title>
  <desc>Pedido de imagem passa pelo provedor padrão; se falhar e o fallback estiver ligado, tenta os próximos. ComfyUIClient lê system_stats/object_info/queue e estima capacidade por GPU.</desc>
  <rect width="980" height="520" rx="14" fill="#12100e"/>
  <text x="490" y="40" text-anchor="middle" fill="#e8e3dc" font-size="20" font-weight="700">Geração de imagem — provedores, fallback e status</text>
  <text x="490" y="64" text-anchor="middle" fill="#8c857c" font-size="12">Settings → Geração de imagem · ComfyUIClient (somente leitura) · verificado ao vivo</text>

  <!-- request -->
  <rect x="40" y="110" width="150" height="56" rx="10" fill="#1e1512" stroke="#cc7a3f" stroke-width="1.5"/>
  <text x="115" y="136" text-anchor="middle" fill="#e8e3dc" font-size="13" font-weight="700">Pedido de imagem</text>
  <text x="115" y="154" text-anchor="middle" fill="#8c857c" font-size="11">usuário</text>

  <!-- provider chain -->
  <line x1="190" y1="138" x2="236" y2="138" stroke="#cc7a3f" stroke-width="2"/>
  <polygon points="236,138 224,131 224,145" fill="#cc7a3f"/>

  <g>
    <rect x="238" y="100" width="190" height="76" rx="10" fill="#1e1512" stroke="#cc7a3f" stroke-width="2"/>
    <text x="333" y="126" text-anchor="middle" fill="#cc7a3f" font-size="13" font-weight="700">1 · Provedor padrão</text>
    <text x="333" y="146" text-anchor="middle" fill="#cfc8bf" font-size="11">ComfyUI (configurável)</text>
    <text x="333" y="162" text-anchor="middle" fill="#8c857c" font-size="10.5">sucesso → retorna imagem</text>
  </g>

  <text x="333" y="198" text-anchor="middle" fill="#e0a33a" font-size="11">falha + fallback ligado ↓</text>

  <g font-size="11">
    <rect x="238" y="210" width="190" height="40" rx="9" fill="#191512" stroke="#5a544c"/>
    <text x="333" y="235" text-anchor="middle" fill="#cfc8bf">2 · OpenWebUI Gen</text>
    <rect x="238" y="258" width="190" height="40" rx="9" fill="#191512" stroke="#5a544c"/>
    <text x="333" y="283" text-anchor="middle" fill="#cfc8bf">3 · Diffusion API genérica</text>
    <rect x="238" y="306" width="190" height="36" rx="9" fill="#1e1512" stroke="#e05a4a"/>
    <text x="333" y="329" text-anchor="middle" fill="#e05a4a">todos falharam → erro claro</text>
  </g>

  <!-- comfy client -->
  <line x1="428" y1="138" x2="486" y2="138" stroke="#cc7a3f" stroke-width="2"/>
  <polygon points="486,138 474,131 474,145" fill="#cc7a3f"/>
  <g>
    <rect x="488" y="96" width="452" height="180" rx="12" fill="#161b22" stroke="#3d7a9e" stroke-width="1.5"/>
    <text x="510" y="122" fill="#6fb0d6" font-size="13" font-weight="700">ComfyUIClient — leitura (GET)</text>
    <g font-size="11.5" fill="#cfc8bf">
      <rect x="510" y="136" width="190" height="32" rx="7" fill="#0f1419"/>
      <text x="524" y="156">GET /system_stats</text>
      <rect x="710" y="136" width="208" height="32" rx="7" fill="#0f1419"/>
      <text x="724" y="156">GPUs · VRAM · RAM · versão</text>

      <rect x="510" y="174" width="190" height="32" rx="7" fill="#0f1419"/>
      <text x="524" y="194">GET /object_info</text>
      <rect x="710" y="174" width="208" height="32" rx="7" fill="#0f1419"/>
      <text x="724" y="194">inventário de modelos (2548 nós)</text>

      <rect x="510" y="212" width="190" height="32" rx="7" fill="#0f1419"/>
      <text x="524" y="232">GET /queue · /history</text>
      <rect x="710" y="212" width="208" height="32" rx="7" fill="#0f1419"/>
      <text x="724" y="232">fila · histórico</text>
    </g>
    <text x="510" y="264" fill="#e05a4a" font-size="11">POST /prompt — NÃO usado nesta fase (geração real)</text>
  </g>

  <!-- capacity -->
  <g>
    <rect x="488" y="296" width="452" height="170" rx="12" fill="#13190f" stroke="#5fa44a" stroke-width="1.5"/>
    <text x="510" y="322" fill="#7bc45e" font-size="13" font-weight="700">ComfyCapacity — "cabe na máquina?"</text>
    <text x="510" y="344" fill="#8c857c" font-size="11">fp8≈1B/param · fp16/bf16≈2B/param · + ~3 GB de folga · vs GPU mais livre</text>
    <g font-size="11.5">
      <rect x="510" y="356" width="408" height="30" rx="7" fill="#18210f"/>
      <circle cx="528" cy="371" r="5" fill="#7bc45e"/>
      <text x="544" y="375" fill="#cfc8bf">sd_xl_base_1.0  (~6.5 GB)</text>
      <text x="900" y="375" text-anchor="end" fill="#7bc45e" font-weight="700">cabe</text>

      <rect x="510" y="392" width="408" height="30" rx="7" fill="#1e1512"/>
      <circle cx="528" cy="407" r="5" fill="#e05a4a"/>
      <text x="544" y="411" fill="#cfc8bf">ltx-2.3-22b-dev-fp8  (~22 GB + folga)</text>
      <text x="900" y="411" text-anchor="end" fill="#e05a4a" font-weight="700">não cabe</text>
    </g>
    <text x="510" y="446" fill="#8c857c" font-size="11">rig real: RTX 3090 (24 GB livre) + RTX 3080 Ti (12 GB) — verificado ao vivo</text>
  </g>
</svg>
