<svg viewBox="0 0 980 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <title>Odysseus — sanitização do repositório (antes → depois)</title>
  <desc>Antes: team id e IPs de LAN em arquivos rastreados. Depois: team id em xcconfig gitignored, IPs genéricos, zero segredos rastreados, push-safe.</desc>
  <rect width="980" height="460" rx="14" fill="#12100e"/>
  <text x="490" y="40" text-anchor="middle" fill="#e8e3dc" font-size="20" font-weight="700">Sanitização do repositório — antes → depois</text>
  <text x="490" y="64" text-anchor="middle" fill="#8c857c" font-size="12">origin = espelho público no GitHub · commits S1, S3/S7</text>

  <!-- ANTES -->
  <g>
    <rect x="36" y="92" width="360" height="320" rx="12" fill="#1e1512" stroke="#e05a4a" stroke-width="1.5"/>
    <text x="56" y="120" fill="#e05a4a" font-size="14" font-weight="700">ANTES — vaza no push</text>
    <g font-size="12.5" fill="#cfc8bf">
      <rect x="56" y="138" width="320" height="44" rx="7" fill="#2a1c18"/>
      <text x="70" y="158" fill="#e05a4a" font-weight="700">⚠ project.yml</text>
      <text x="70" y="174">DEVELOPMENT_TEAM = FZ5•••••• (real)</text>

      <rect x="56" y="192" width="320" height="44" rx="7" fill="#2a1c18"/>
      <text x="70" y="212" fill="#e05a4a" font-weight="700">⚠ ServerConfig / SettingsView</text>
      <text x="70" y="228">placeholder 192.168.x.x:7000 (LAN)</text>

      <rect x="56" y="246" width="320" height="44" rx="7" fill="#2a1c18"/>
      <text x="70" y="266" fill="#e05a4a" font-weight="700">⚠ docs *.md</text>
      <text x="70" y="282">ComfyUI 192.168.x.x:8190 (LAN)</text>

      <rect x="56" y="300" width="320" height="40" rx="7" fill="#2a1c18"/>
      <text x="70" y="325" fill="#e05a4a" font-weight="700">⚠ PRIVACY.md</text>
    </g>
    <text x="56" y="372" fill="#e0a33a" font-size="12.5">git push → expõe team id + IPs</text>
    <text x="56" y="394" fill="#8c857c" font-size="11.5">3.9 GB de build-*/ fora do .gitignore</text>
  </g>

  <!-- seta -->
  <g>
    <line x1="412" y1="252" x2="566" y2="252" stroke="#cc7a3f" stroke-width="2.5"/>
    <polygon points="566,252 552,244 552,260" fill="#cc7a3f"/>
    <rect x="430" y="206" width="120" height="26" rx="13" fill="#1e1512" stroke="#cc7a3f"/>
    <text x="490" y="224" text-anchor="middle" fill="#cc7a3f" font-size="12" font-weight="700">S1 · S3/S7</text>
    <rect x="430" y="272" width="120" height="26" rx="13" fill="#1e1512" stroke="#cc7a3f"/>
    <text x="490" y="290" text-anchor="middle" fill="#cc7a3f" font-size="12" font-weight="700">build ✓</text>
  </g>

  <!-- DEPOIS -->
  <g>
    <rect x="584" y="92" width="360" height="320" rx="12" fill="#13190f" stroke="#5fa44a" stroke-width="1.5"/>
    <text x="604" y="120" fill="#7bc45e" font-size="14" font-weight="700">DEPOIS — push-safe</text>
    <g font-size="12.5" fill="#cfc8bf">
      <rect x="604" y="138" width="320" height="44" rx="7" fill="#18210f"/>
      <text x="618" y="158" fill="#7bc45e" font-weight="700">✓ project.yml → configFiles</text>
      <text x="618" y="174">Signing.xcconfig (commitado, vazio)</text>

      <rect x="604" y="192" width="320" height="44" rx="7" fill="#18210f"/>
      <text x="618" y="212" fill="#7bc45e" font-weight="700">✓ Local.xcconfig (gitignored)</text>
      <text x="618" y="228">team id só local · .example p/ clones</text>

      <rect x="604" y="246" width="320" height="44" rx="7" fill="#18210f"/>
      <text x="618" y="266" fill="#7bc45e" font-weight="700">✓ código + docs</text>
      <text x="618" y="282">meu-servidor:porta · &lt;comfyui-host&gt;</text>

      <rect x="604" y="300" width="320" height="40" rx="7" fill="#18210f"/>
      <text x="618" y="325" fill="#7bc45e" font-weight="700">✓ 0 segredos rastreados</text>
    </g>
    <text x="604" y="372" fill="#7bc45e" font-size="12.5">git push → seguro (team id/IP fora)</text>
    <text x="604" y="394" fill="#8c857c" font-size="11.5">.gitignore exclui build-*/ · build ✓</text>
  </g>
</svg>
